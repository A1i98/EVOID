name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/docs-astro/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "deploy-docs"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/docs-astro/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: docs/docs-astro

      - name: Build
        run: npm run build
        working-directory: docs/docs-astro

      - name: Deploy to gh-pages
        run: |
          cd docs/docs-astro/dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          touch .nojekyll
          git add -A
          git commit -m "deploy: documentation site [skip ci]"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:gh-pages
