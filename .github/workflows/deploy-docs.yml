name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/docs-astro/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/docs-astro/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: docs/docs-astro

      - name: Build
        run: npm run build
        working-directory: docs/docs-astro

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/docs-astro/dist
          publish_branch: gh-pages
          force_orphan: true
